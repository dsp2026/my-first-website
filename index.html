<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 첫 번째 웹사이트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .avatar { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 28px; color: #2d3748; margin-bottom: 8px; }
    .subtitle { color: #667eea; font-weight: 600; margin-bottom: 20px; }
    p { color: #718096; line-height: 1.7; margin-bottom: 28px; }
    .badge {
      display: inline-block;
      background: #f0f0ff;
      color: #667eea;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 14px;
      margin: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👋</div>
    <h1>안녕하세요!</h1>
    <p class="subtitle">나의 첫 번째 웹사이트에 오신 것을 환영합니다</p>
    <p>이 페이지는 GitHub Pages로 배포된 나의 첫 번째 웹사이트입니다.<br>앞으로 더 멋진 프로젝트로 찾아올게요!</p>
    <div>
      <span class="badge">🚀 GitHub Pages</span>
      <span class="badge">💻 HTML/CSS</span>
      <span class="badge">✨ 첫 배포</span>
    </div>
  </div>
</body>
</html>
